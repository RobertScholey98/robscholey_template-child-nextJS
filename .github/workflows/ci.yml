name: ci

on:
  push:
    branches: [master]
  pull_request:

# Successive pushes to the same ref cancel earlier in-flight CI so we don't
# stack runs while iterating on a branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@739bfe42ca9233c5e6aca07c1a25a9d34aca49b0 # v6.0.7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

      # Master push with green CI fires a service-changed dispatch at the
      # meta-repo's deploy workflow; PRs run CI but never dispatch.
      - name: Mint dispatch token
        id: dispatch-token
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.DISPATCH_APP_ID }}
          private-key: ${{ secrets.DISPATCH_APP_PRIVATE_KEY }}
          owner: robscholey
          repositories: robscholey.com

      - name: Dispatch service-changed to meta-repo
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ steps.dispatch-token.outputs.token }}
        run: |
          gh api repos/robscholey/robscholey.com/dispatches \
            -X POST \
            -f event_type=service-changed \
            -F 'client_payload[service]=template-child-nextjs' \
            -F "client_payload[sha]=${{ github.sha }}"
